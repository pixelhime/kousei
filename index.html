<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>校正 ｜ ホラーノベル</title>
<meta name="description" content="呪いの原稿を、墨で塗り消して世に送り出す。選択肢は、ない。消すことだけが、あなたの意思になる。原稿三本・全九結末の連作ホラーノベル。">
<meta name="theme-color" content="#0b0a09">
<meta name="color-scheme" content="dark">
<meta property="og:type" content="website">
<meta property="og:title" content="校正 ｜ ホラーノベル">
<meta property="og:description" content="呪いの原稿を、墨で塗り消して世に送り出す。消すことだけが、あなたの意思になる。原稿三本・全九結末の連作ホラーノベル。">
<meta property="og:image" content="https://pixelhime.github.io/kousei/og-image.png">
<meta property="og:url" content="https://pixelhime.github.io/kousei/">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="校正 ｜ ホラーノベル">
<meta name="twitter:description" content="墨で塗り消して世に送り出す。消すことだけが、あなたの意思になる。原稿三本・全九結末の連作ホラーノベル。">
<meta name="twitter:image" content="https://pixelhime.github.io/kousei/og-image.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="校正">
<style>
  :root{
    --ink:#17120d;
    --paper:#efe6d1;
    --paper-dim:#e6dcc4;
    --memo:#e9e5da;
    --red:#a33327;
    --bg:#0b0a09;
    --fg:#c9c1af;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    background-image:radial-gradient(ellipse at 50% 30%, #16130f 0%, #0b0a09 70%);
    color:var(--fg);
    font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",serif;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  section{display:none;width:100%;height:100%;align-items:center;justify-content:center;flex-direction:column;}
  section.on{display:flex;}

  /* ---------- title ---------- */
  #s-title{overflow-y:auto;}
  #s-title h1{
    writing-mode:vertical-rl;
    font-size:clamp(44px,9vw,76px);
    letter-spacing:.35em;
    color:#ddd3bd;
    text-shadow:0 0 30px rgba(0,0,0,.9);
    font-weight:600;
  }
  #s-title .sub{margin-top:20px;font-size:14px;letter-spacing:.5em;color:#8a8172;}
  #s-title .pub{margin-top:8px;font-size:12px;letter-spacing:.3em;color:#5d564a;}
  #inbox{
    margin-top:34px;display:flex;gap:18px;flex-wrap:wrap;justify-content:center;
    padding:0 4vw 30px;
  }
  .card{
    width:180px;padding:20px 18px 16px;
    background:linear-gradient(175deg,#252017 0%,#1a1611 60%,#141109 100%);
    border:1px solid #4a4335;
    cursor:pointer;transition:transform .2s, border-color .2s;
    text-align:center;
  }
  .card:hover{transform:translateY(-4px);border-color:#8a8172;}
  .card .c-no{font-size:11px;letter-spacing:.4em;color:#7a7263;margin-bottom:12px;}
  .card .c-title{font-size:20px;letter-spacing:.2em;color:#ddd3bd;margin-bottom:8px;}
  .card .c-auth{font-size:12px;letter-spacing:.15em;color:#8a8172;margin-bottom:14px;}
  .card .c-ends{display:flex;gap:6px;justify-content:center;font-size:11px;letter-spacing:.1em;}
  .card .c-ends span{border:1px solid #3a352c;padding:3px 7px;color:#4a4438;}
  .card .c-ends span.got{color:#c9c1af;border-color:#6b6353;background:#171410;}
  .card.locked{cursor:default;opacity:.45;}
  .card.locked:hover{transform:none;border-color:#4a4335;}
  #all-done{margin-top:6px;font-size:12px;letter-spacing:.3em;color:#8a8172;min-height:1.4em;}
  #reset-zone{margin-top:20px;}
  #btn-reset{background:none;border:1px solid #3a352c;color:#6b6353;font-size:12px;letter-spacing:.15em;text-indent:0;padding:8px 18px;}
  #btn-reset:hover{background:#171410;color:#a89a78;}
  #btn-reset.danger{border-color:#8a3a2c;color:#d99a8a;}
  #btn-reset:disabled{opacity:.35;cursor:default;}
  #s-title .ver{margin-top:16px;font-size:11px;letter-spacing:.3em;color:#4c4739;}
  #hint-note{margin-top:2px;font-size:12px;letter-spacing:.12em;color:#7a7263;min-height:1.3em;}
  .card .c-ends span.hintable{cursor:pointer;border-style:dashed;color:#8a7d55;transition:color .2s,background .2s;}
  .card .c-ends span.hintable:hover{color:#d9b566;border-color:#8a7d55;background:#1a1610;}
  #hintbox{position:fixed;inset:0;background:rgba(6,5,3,.82);display:none;align-items:center;justify-content:center;z-index:60;padding:0 6vw;}
  #hintbox.on{display:flex;}
  #hintbox .panel{width:min(92vw,460px);background:linear-gradient(175deg,#ece8dd,#e6dcc4);color:#33302a;padding:28px 32px 22px;box-shadow:0 18px 60px rgba(0,0,0,.7);}
  #hintbox .hb-tag{font-size:12px;letter-spacing:.22em;color:#8a7250;border-bottom:1px solid #b7a980;padding-bottom:8px;margin-bottom:16px;display:flex;justify-content:space-between;}
  #hintbox .hb-end{font-size:19px;letter-spacing:.2em;color:#a33327;margin-bottom:14px;}
  #hintbox .hb-body{font-size:15px;line-height:2;letter-spacing:.04em;min-height:4em;}
  #hintbox .hb-stage{margin-top:12px;font-size:11px;letter-spacing:.2em;color:#9d8f6a;}
  #hintbox .hb-actions{margin-top:20px;display:flex;gap:12px;justify-content:center;}
  #hintbox .hb-actions button{padding:9px 20px;font-size:13px;letter-spacing:.2em;background:#2a241b;color:#e7dcc4;border:1px solid #6b6353;}
  #hintbox .hb-actions button:hover{background:#39301f;color:#f4ead3;}
  #hintbox .hb-more{border-color:#8a3a2c!important;color:#e8b8a8!important;}
  #hintbox .hb-more:disabled{opacity:.4;}
  .memo .whisper{color:#7d6a45;border-left:2px solid #b7a980;padding-left:12px;}

  button{
    font-family:inherit;
    background:#1c1813;color:#cfc6b2;
    border:1px solid #4a4335;
    padding:12px 34px;font-size:15px;letter-spacing:.3em;text-indent:.3em;
    cursor:pointer;transition:background .2s,color .2s;
  }
  button:hover{background:#2b251d;color:#efe6d1;}
  button:disabled{opacity:.35;cursor:default;}

  /* ---------- memo ---------- */
  .memo{
    width:min(92vw,600px);
    background:linear-gradient(175deg,#ece8dd 0%,var(--memo) 55%,#ddd8ca 100%);
    color:#33302a;
    padding:38px 44px 34px;
    box-shadow:0 18px 60px rgba(0,0,0,.75);
    position:relative;
    line-height:2;
    font-size:15px;
    max-height:86vh;overflow-y:auto;
  }
  .memo .head{
    display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:1px solid #9d9581;padding-bottom:8px;margin-bottom:20px;
    font-size:13px;letter-spacing:.2em;color:#6d6555;
  }
  .memo .stamp{
    position:absolute;top:22px;right:26px;
    width:44px;height:44px;border:2px solid rgba(163,51,39,.65);border-radius:6px;
    color:rgba(163,51,39,.7);font-size:22px;display:flex;align-items:center;justify-content:center;
    transform:rotate(6deg);pointer-events:none;
  }
  .memo p{margin-bottom:1em;}
  .memo .rule{margin-left:1em;color:#57503f;}
  .memo .memo-actions{margin-top:26px;text-align:center;}
  .memo input{
    font-family:inherit;font-size:16px;letter-spacing:.15em;
    background:transparent;border:none;border-bottom:1px solid #8d8570;
    padding:6px 4px;width:220px;color:#2a2620;outline:none;text-align:center;
  }
  .bar{
    background:linear-gradient(180deg,#221c15,#0f0c09);
    color:transparent;border-radius:1px;padding:0 .15em;cursor:pointer;
    transition:color .15s;user-select:none;
  }
  .bar.reveal{color:#efe6d1;}

  /* ---------- game ---------- */
  #directive{
    width:min(92vw,660px);
    font-size:13px;letter-spacing:.15em;line-height:1.8;
    color:#9a9180;margin-bottom:14px;
    border-left:3px solid #4a4335;padding-left:14px;
  }
  #directive b{color:#c9bfa8;font-weight:600;}
  #paper{
    writing-mode:vertical-rl;
    width:min(92vw,660px);
    height:min(62vh,500px);
    background:
      repeating-linear-gradient(to left, rgba(120,100,70,.14) 0 1px, transparent 1px 46px),
      linear-gradient(170deg,#f2ead6 0%,var(--paper) 50%,var(--paper-dim) 100%);
    color:var(--ink);
    box-shadow:0 20px 70px rgba(0,0,0,.8), inset 0 0 60px rgba(140,110,70,.12);
    padding:34px 38px;
    font-size:clamp(16px,2.6vw,19px);
    line-height:46px;
    letter-spacing:.06em;
    overflow-x:auto;overflow-y:hidden;
  }
  .tok{border-radius:1px;transition:background .5s;}
  .tok.hit{cursor:pointer;transition:background .18s;}
  .tok.hit:hover{background:rgba(40,30,18,.16);box-shadow:0 0 0 2px rgba(40,30,18,.16);}
  .tok.redacted,.tok.pre{
    background:linear-gradient(90deg,#221c15,#0e0b08 60%,#1a1510);
    color:transparent;cursor:default;pointer-events:none;
    box-shadow:inset 0 0 4px rgba(0,0,0,.9);
    animation:inkin .25s ease-out;
    user-select:none;
  }
  @keyframes inkin{from{opacity:.2;}to{opacity:1;}}

  #hud{
    width:min(92vw,660px);
    display:flex;align-items:center;gap:16px;
    margin-top:16px;font-size:13px;letter-spacing:.15em;color:#8a8172;
    flex-wrap:wrap;
  }
  #hud .grow{flex:1;}
  #hud button{padding:8px 18px;font-size:13px;}
  #btn-submit{border-color:#6d3f34;color:#cf9a8d;}
  #btn-submit:hover{background:#2b1c17;color:#efd3c8;}

  #toast{
    position:fixed;left:50%;top:8%;transform:translateX(-50%) rotate(-1deg);
    background:#f0e9d8;color:var(--red);
    border:2px solid var(--red);
    padding:12px 26px;font-size:14px;letter-spacing:.15em;line-height:1.8;
    box-shadow:0 10px 40px rgba(0,0,0,.7);
    opacity:0;pointer-events:none;transition:opacity .3s;
    max-width:88vw;
  }
  #toast.on{opacity:1;}

  /* ---------- confirm ---------- */
  #confirm{
    position:fixed;inset:0;background:rgba(5,4,3,.82);
    display:none;align-items:center;justify-content:center;flex-direction:column;gap:30px;
    z-index:50;
  }
  #confirm.on{display:flex;}
  #confirm .line{font-size:20px;letter-spacing:.4em;color:#ddd3bd;}
  #confirm .btns{display:flex;gap:20px;}

  /* ---------- ending ---------- */
  #s-end{padding:0 6vw;}
  #end-title{
    font-size:clamp(34px,7vw,56px);letter-spacing:.4em;color:#ddd3bd;margin-bottom:40px;
    text-shadow:0 0 26px rgba(0,0,0,.9);
  }
  #end-body{
    max-width:640px;font-size:15px;line-height:2.4;letter-spacing:.08em;color:#b3ab99;
    max-height:56vh;overflow-y:auto;
  }
  #end-body p{margin-bottom:1.4em;opacity:0;animation:fadein 1.6s ease forwards;}
  @keyframes fadein{to{opacity:1;}}
  #s-end button{margin-top:38px;}

  #rain-btn{
    position:fixed;top:16px;right:18px;z-index:60;
    background:none;border:1px solid #3a352c;color:#7a7263;
    padding:6px 14px;font-size:12px;letter-spacing:.2em;
  }
  ::-webkit-scrollbar{height:6px;width:6px;}
  ::-webkit-scrollbar-thumb{background:#3a352c;}
</style>
</head>
<body>

<button id="rain-btn">雨音　切</button>

<section id="s-title" class="on">
  <h1>校　正</h1>
  <div class="sub" id="title-sub">――消セ。</div>
  <div class="pub">鵜山書房　校閲部　受け取り箱</div>
  <div id="inbox"></div>
  <div id="hint-note"></div>
  <div id="all-done"></div>
  <div id="reset-zone"><button id="btn-reset">結末をすべて消して、最初から</button></div>
  <div class="ver">ver 1.1</div>
</section>

<div id="hintbox">
  <div class="panel">
    <div class="hb-tag"><span>校閲メモ　――余白に</span><span id="hb-msname"></span></div>
    <div class="hb-end" id="hb-end"></div>
    <div class="hb-body" id="hb-body"></div>
    <div class="hb-stage" id="hb-stage"></div>
    <div class="hb-actions">
      <button id="hb-prev">前のヒント</button>
      <button class="hb-more" id="hb-more">もっと詳しく</button>
      <button id="hb-close">閉じる</button>
    </div>
  </div>
</div>

<section id="s-memo"></section>

<section id="s-game">
  <div id="directive"></div>
  <div id="paper"></div>
  <div id="hud">
    <span id="hud-ch"></span>
    <span id="hud-page"></span>
    <span id="hud-req"></span>
    <span id="hud-count"></span>
    <span class="grow"></span>
    <button id="btn-prev">前の頁</button>
    <button id="btn-next">次の頁</button>
    <button id="btn-submit">提出</button>
  </div>
</section>

<section id="s-end">
  <div id="end-title"></div>
  <div id="end-body"></div>
  <button onclick="location.reload()">受け取り箱へ</button>
</section>

<div id="toast"></div>

<div id="confirm">
  <div class="line">墨は、戻らない。</div>
  <div class="btns">
    <button id="btn-ink">入れる</button>
    <button id="btn-noink">やめる</button>
  </div>
</div>

<script>
'use strict';
const $ = id => document.getElementById(id);

/* ================= persistence ================= */

function loadEndings(){
  try{
    const v = JSON.parse(localStorage.getItem("kousei_endings2"));
    if(v && typeof v === "object") return {ms1:v.ms1||[], ms2:v.ms2||[], ms3:v.ms3||[]};
  }catch(e){}
  // migrate v1
  let legacy=[];
  try{ legacy = JSON.parse(localStorage.getItem("kousei_endings")||"[]"); }catch(e){}
  return {ms1:legacy, ms2:[], ms3:[]};
}
function saveEndings(obj){
  try{ localStorage.setItem("kousei_endings2", JSON.stringify(obj)); }catch(e){}
}
function loadName(){ try{ return localStorage.getItem("kousei_name")||""; }catch(e){ return ""; } }
function saveName(n){ try{ localStorage.setItem("kousei_name", n); }catch(e){} }
function loadFed(){
  try{ const v=JSON.parse(localStorage.getItem("kousei_words")||"[]"); return Array.isArray(v)?v:[]; }catch(e){ return []; }
}
function saveFed(words){
  try{
    const cur = loadFed();
    const merged = [...new Set([...cur, ...words])].slice(-60);
    localStorage.setItem("kousei_words", JSON.stringify(merged));
  }catch(e){}
}

/* ================= manuscripts ================= */

const manuscripts = [

/* ---------- 原稿一『雨の家』 ---------- */
{
  key:"ms1", no:"原稿一", bookLabel:"『雨の家』", cardTitle:"雨の家", author:"若辺三千代",
  endDefs:[["seal","■■"],["reprint","増刷"],["black","黒本"]],
  chapters:[
  {
    title:"第一章　雨の家",
    reqTag:"n", reqLabel:"個人名・地名",
    instruction:"指示書：個人が特定できる語（人名・地名）を、すべて墨で消せ。",
    pages:[
      ["六月十三日。","雨。","¶","　夫の","[n]明彦","と、","[n]睦見町","のはずれの","この家に","越してきた。","駅から遠いぶん","家賃は安く、","庭には","大きな柿の木がある。","¶","　挨拶に行った","隣家の","[n]戸張さん","は、","私たちの顔を見て、","なぜか少し","黙った。"],
      ["六月十五日。","雨。","¶","　二階の納戸から、","前の住人の","忘れ物が出てきた。","子ども用の長靴。","左だけが、","なぜか","濡れていた。","¶","　","[n]明彦","は","「雨漏りだろう」","と笑った。","天井に、","染みはなかった。"],
      ["六月二十日。","雨。","¶","　この町は雨が多い。","[n]戸張さん","の奥さんが、","垣根越しに","教えてくれた。","¶","　――この家ね、","庭に立つ人がいても、","見ないであげて。","¶","　冗談だと思って","笑ったら、","奥さんは","笑わなかった。"],
      ["六月二十一日。","雨。","¶","　夜中、","庭で水の音がした。","雨だれとは違う。","たとえば","背の高い人が","水たまりを","ゆっくり歩くような音。","¶","　カーテンは","開けなかった。","私は","[n]三千代","。","[n]若辺三千代","。","名前を確かめたくなる夜が","あることを、","初めて知った。"]
    ]
  },
  {
    title:"第二章　庭のもの",
    reqTag:"d", reqLabel:"姿の描写",
    instruction:"指示書：「それ」の姿かたちに触れる語を、すべて墨で消せ。読者に、姿を想像させるな。",
    pages:[
      ["七月二日。","雨。","¶","　庭に、","立っていた。","¶","　","[d]背の高い、","[d]濡れそぼった","何かだった。","柿の木の下、","雨の中に、","傘もささずに。","¶","　顔は見ていない。","見なかった。","奥さんの言いつけを","守ったのだ、","私は。"],
      ["七月八日。","雨。","¶","　夫の帰りが","遅い日が増えた。","仕事だと言う。","噓の匂いはしないのに、","玄関に立つ夫の後ろに、","[d]髪の長い","影がたたまれて、","一緒に入ってくる。","¶","　影は、","[d]逆さまに","立っている。"],
      ["七月十五日。","雨。","¶","　わかったことを","書いておく。","あれには","[d]口しかない","。","目も鼻もなく、","[d]濡れた髪","のあいだに、","[d]口だけが縦に","開いている。","¶","　どうして","知っているのだろう。","私は一度も","見ていないのに。"],
      ["七月十六日。","曇り。","¶","　雨がやんだ。","三十四日ぶりに。","¶","　なのに、","庭の柿の木の下だけ、","まだ","雨の音がしている。"]
    ]
  },
  {
    title:"第三章　呼び名",
    reqTag:"k", reqLabel:"呼び名",
    instruction:"指示書：あれの呼び名を、一つ残らず墨で消せ。名は、呼ぶためにあるからだ。",
    pages:[
      ["七月二十日。","雨。","¶","　夫が、","あれに名前を","つけていた。","夜中、","庭に向かって","呼んでいたのだ。","おいで、","[k]くろさま","、と。","¶","　名前を呼ぶと、","来る。","名は","呼ぶためにある。","本当はこの日記にも、","書いてはいけない。"],
      ["七月二十四日。","雨。","¶","　","[k]くろさま","は","もう家の中にいる。","黒いところに、","いる。","¶","　書き損じを","墨で塗りつぶすと、","消したところが","ぬるく","あたたかい。","ことばを","食べているのだ。","私の消した","ことばを。"],
      ["七月三十日。","雨。","¶","　これを読んでいる人。","校正の人。","[NAME]","さん。","あなたのことだ。","¶","　あなたが消したことばを、","[k]くろさま","が拾って、","口の中で","転がしている。","¶","　","[W1]","、","[W2]","、","[W3]","――ほら。","おいしそうに。","¶","　それでも","消してください。","もう、","消すしか","ないのです。"],
      ["八月一日。","雨。","¶","　最後のお願いです。","この日記が","本になるとき、","名前だけは","残さないで。","名は呼ぶためにある。","呼ばれた人の家に、","[k]くろさま","は行く。","¶","　私の名前は、","もう","[X]████","。","¶","　あとの始末は、","校正のひと、","どうか","お願いします。"]
    ]
  },
  {
    title:"奥付",
    reqTag:null, reqLabel:"なし",
    instruction:"指示書：校了。形式の確認のみ。――何も消すな。いいな。何も、消すな。",
    pages:[
      ["雨の家","¶","¶","著者","　","[X]████████","¶","発行","　鵜山書房","¶","校閲担当","　","[me]","¶","¶","初版回収につき、","改め第二版。"]
    ]
  }],

  memo(i){
    const head = memoHead();
    if(i===0){
      const saved = loadName();
      return `<div class="memo">${head}
      <p>例の回収本『雨の家』を、第二版として出し直すことになった。初版で騒ぎになった箇所は、墨消しで処理する。それが君の仕事だ。</p>
      ${replayMemoHint("ms1")}
      <p class="rule">一、疑わしい語は、クリックで墨を入れる。<br>
      二、墨は、戻らない。よく読んでから消せ。<br>
      三、消しすぎた本は、本ではなくなる。</p>
      <p>まずは下に担当者名を。仕事は、名前から始まる。</p>
      <div class="memo-actions">

function parseToken(raw){
  let tag = null, text = raw;
  const m = raw.match(/^\[(n|d|k|c|h|X|me|NAME|W1|W2|W3|F1|F2|F3|F4|F5|F6)\](.*)$/s)
    || (raw==="[me]"||raw==="[NAME]" ? [raw, raw.slice(1,-1), ""] : null);
  if(m){ tag = m[1]; text = m[2]; }
  return { tag, text, raw };
}

// model[ms][ci][pi][ti]
const model = manuscripts.map((ms,mi) =>
  ms.chapters.map((ch,ci) =>
    ch.pages.map((pg,pi) =>
      pg.map((raw,ti) => ({...parseToken(raw), key:mi+":"+ci+":"+pi+":"+ti})))));

function tokenText(t){
  if(t.tag==="me" || t.tag==="NAME") return state.name;
  if(/^W[123]$/.test(t.tag||"")){
    const i = +t.tag[1]-1;
    return "『"+((state.picked&&state.picked[i])||"ことば")+"』";
  }
  if(/^F[1-6]$/.test(t.tag||"")){
    const i = +t.tag[1]-1;
    return "『"+((state.fed&&state.fed[i])||"あめ")+"』";
  }
  return t.text;
}
function isClickable(t){
  if(t.raw==="¶" || t.tag==="X") return false;
  return PUNCT.test(tokenText(t));
}
function curChapters(){ return manuscripts[state.ms].chapters; }
function isRequired(t,ci){ const rt = curChapters()[ci].reqTag; return rt != null && t.tag === rt; }

function cleanWord(s){
  return s.replace(/[\s、。「」『』（）()――——・…！？!?]/g,"");
}

/* ---- ending helpers (current manuscript) ---- */
function forEachToken(fn){
  model[state.ms].forEach((chm,ci)=>chm.forEach(pg=>pg.forEach(t=>fn(t,ci))));
}
function nameRedacted(){
  let hit=false;
  forEachToken(t=>{ if(t.tag==="me"&&state.redacted.has(t.key)) hit=true; });
  return hit;
}
function redactedNonNameCount(){
  let n=0;
  forEachToken(t=>{ if(t.tag!=="me" && state.redacted.has(t.key)) n++; });
  return n;
}
function extraTotal(){ return state.chapterExtra.reduce((a,b)=>a+b,0); }
function tagAllRedacted(tag){
  let ok=true;
  forEachToken(t=>{ if(t.tag===tag && !state.redacted.has(t.key)) ok=false; });
  return ok;
}
function tagRedactedCount(tag){
  let n=0;
  forEachToken(t=>{ if(t.tag===tag && state.redacted.has(t.key)) n++; });
  return n;
}
function redactedRatio(){
  let total=0, red=0;
  forEachToken(t=>{
    if(t.raw==="¶"||t.tag==="X") return;
    if(!isClickable(t)) return;
    total++;
    if(state.redacted.has(t.key)) red++;
  });
  return total ? red/total : 0;
}

/* ================= audio ================= */

let ctx=null, rainGain=null, rainOn=false;
function initAudio(){
  if(ctx) return;
  try{
    ctx = new (window.AudioContext||window.webkitAudioContext)();
    const len = 2*ctx.sampleRate;
    const buf = ctx.createBuffer(1,len,ctx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    const src = ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    const lp = ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=650; lp.Q.value=.5;
    rainGain = ctx.createGain(); rainGain.gain.value=0;
    src.connect(lp); lp.connect(rainGain); rainGain.connect(ctx.destination);
    src.start();
  }catch(e){ ctx=null; }
}
function setRain(on){
  initAudio(); if(!ctx) return;
  rainOn = on;
  rainGain.gain.linearRampToValueAtTime(on?0.05:0, ctx.currentTime+0.8);
  $("rain-btn").textContent = on ? "雨音　入" : "雨音　切";
}
function thunk(){
  if(!ctx) return;
  const t = ctx.currentTime;
  const o = ctx.createOscillator();
  o.type="sine";
  o.frequency.setValueAtTime(130,t);
  o.frequency.exponentialRampToValueAtTime(45,t+0.09);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.14,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t+0.16);
}
$("rain-btn").onclick = () => setRain(!rainOn);

/* ================= screens ================= */

function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("on"));
  $(id).classList.add("on");
}
function memoHead(){
  return `<div class="head"><span>社内メモ　鵜山書房</span><span>校閲部行</span></div><div class="stamp">鵜</div>`;
}

function flowSteps(){
  const steps=["memo0"];
  curChapters().forEach((ch,ci)=>{
    steps.push("ch"+ci);
    if(ci < curChapters().length-1) steps.push("memo"+(ci+1));
  });
  steps.push("end");
  return steps;
}

function advance(){
  state.flowIdx++;
  const step = flowSteps()[state.flowIdx];
  if(step==="end") return showEnding();
  if(step.startsWith("memo")) return showMemo(+step.slice(4));
  if(step.startsWith("ch"))   return startChapter(+step.slice(2));
}

/* ---------- memos ---------- */

function pickWords(){
  const extras = state.words.filter(w=>!w.req).map(w=>w.w);
  const reqs   = state.words.filter(w=> w.req).map(w=>w.w);
  const pool = [...new Set([...extras.reverse(), ...reqs.reverse()])].filter(w=>w.length>0);
  const out=[];
  while(out.length<3 && pool.length) out.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
  while(out.length<3) out.push("ことば");
  return out;
}
function pickFedForMemo(){
  const pool=[...loadFed()];
  const out=[];
  while(out.length<3 && pool.length) out.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
  while(out.length<3) out.push("ことば");
  return out.map(esc);
}

function showMemo(i){
  const ms = manuscripts[state.ms];
  $("s-memo").innerHTML = ms.memo(i);
  show("s-memo");
  document.querySelectorAll("#s-memo .bar").forEach(b=>{
    b.onclick = ()=>{
      b.textContent = b.dataset.w || "████";
      b.classList.add("reveal");
      setTimeout(()=>{ b.textContent="████"; b.classList.remove("reveal"); }, 700);
    };
  });
  $("memo-next").onclick = ()=>{ ms.onMemoNext(i); advance(); };
}

/* ---------- chapter ---------- */

function startChapter(ci){
  state.ci = ci; state.page = 0;
  if(state.ms===0 && ci===2) state.picked = pickWords();
  const ch = curChapters()[ci];
  $("directive").innerHTML = "<b>"+ch.title+"</b>　　"+ch.instruction;
  show("s-game");
  renderPage();
}

function requiredLeft(ci){
  let n=0;
  model[state.ms][ci].forEach(pg=>pg.forEach(t=>{
    if(isRequired(t,ci) && !state.redacted.has(t.key)) n++;
  }));
  return n;
}

function renderPage(){
  const ci=state.ci, pi=state.page;
  const paper=$("paper");
  paper.innerHTML="";
  model[state.ms][ci][pi].forEach(t=>{
    if(t.raw==="¶"){ paper.appendChild(document.createElement("br")); return; }
    const sp=document.createElement("span");
    sp.className="tok";
    sp.textContent=tokenText(t);
    if(t.tag==="X"||state.redacted.has(t.key)) sp.classList.add(t.tag==="X"?"pre":"redacted");
    else if(isClickable(t)){
      sp.classList.add("hit");
      sp.onclick=()=>tryRedact(sp,t);
    }
    paper.appendChild(sp);
  });
  paper.scrollLeft = paper.scrollWidth;
  updateHud();
}

function tryRedact(el,t){
  if(!state.firstInkDone){
    state.pending={el,t};
    $("confirm").classList.add("on");
    return;
  }
  doRedact(el,t);
}
function doRedact(el,t){
  state.redacted.add(t.key);
  const req = isRequired(t,state.ci);
  const w = cleanWord(tokenText(t));
  if(w && t.tag!=="me") state.words.push({w, req});
  if(!req && t.tag!=="me") state.chapterExtra[state.ci]++;
  el.classList.remove("hit");
  el.classList.add("redacted");
  el.onclick=null;
  thunk();
  updateHud();
}
$("btn-ink").onclick=()=>{
  $("confirm").classList.remove("on");
  state.firstInkDone=true;
  if(state.pending){ doRedact(state.pending.el,state.pending.t); state.pending=null; }
};
$("btn-noink").onclick=()=>{
  $("confirm").classList.remove("on");
  state.pending=null;
};

function updateHud(){
  const ci=state.ci, ch=curChapters()[ci];
  const last = ci===curChapters().length-1;
  $("hud-ch").textContent = manuscripts[state.ms].bookLabel;
  $("hud-page").textContent = "頁 "+(state.page+1)+"／"+ch.pages.length;
  $("hud-req").textContent = ch.reqTag ? "対象語（"+ch.reqLabel+"）残り "+requiredLeft(ci) : "対象語　なし";
  $("hud-count").textContent = "消した語 "+state.redacted.size;
  $("btn-prev").disabled = state.page===0;
  $("btn-next").disabled = state.page===ch.pages.length-1;
  $("btn-submit").textContent = last ? "校了に回す" : "提出";
  if(state.ms===0 && ci===3){ $("btn-next").textContent="次の█"; $("btn-prev").textContent="前の█"; }
  else { $("btn-next").textContent="次の頁"; $("btn-prev").textContent="前の頁"; }
}

$("btn-prev").onclick=()=>{ if(state.page>0){state.page--;renderPage();} };
$("btn-next").onclick=()=>{ if(state.page<curChapters()[state.ci].pages.length-1){state.page++;renderPage();} };

let toastTimer=null;
function toast(msg){
  const t=$("toast");
  t.innerHTML=msg;
  t.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("on"),3200);
}

$("btn-submit").onclick=()=>{
  const ci=state.ci, ch=curChapters()[ci];
  const left=requiredLeft(ci);
  if(ch.reqTag && left>0){
    toast("【差し戻し】まだ生きている語がある。<br>（"+ch.reqLabel+"：残り "+left+"）");
    for(let pi=0;pi<model[state.ms][ci].length;pi++){
      if(model[state.ms][ci][pi].some(t=>isRequired(t,ci)&&!state.redacted.has(t.key))){
        state.page=pi; renderPage(); break;
      }
    }
    return;
  }
  const isLastChapter = ci===curChapters().length-1;
  if(isLastChapter && state.ms===2 && manuscripts[2].decide()==="done"){
    cascadeThenEnd();
    return;
  }
  advance();
};

/* true-end cascade: the manuscript blacks itself out */
function cascadeThenEnd(){
  const toks=[...document.querySelectorAll("#paper .tok:not(.redacted):not(.pre)")];
  toks.forEach((el,i)=>setTimeout(()=>{ el.classList.remove("hit"); el.classList.add("redacted"); el.onclick=null; }, 120*i));
  setTimeout(advance, 120*toks.length + 1200);
}

/* ---------- endings ---------- */

function showEnding(){
  const ms = manuscripts[state.ms];
  const key = ms.decide();
  const e = ms.endings[key];
  const all = loadEndings();
  if(!all[ms.key].includes(key)){ all[ms.key].push(key); saveEndings(all); }
  saveFed(state.words.map(w=>w.w).filter(w=>w.length>0));
  $("end-title").textContent=e.title;
  $("end-body").innerHTML=e.body.map((p,i)=>
    `<p style="animation-delay:${i*0.9}s">${esc(p).replace("{NAME}",esc(state.name))}</p>`).join("");
  show("s-end");
  if(state.ms===2 && key==="done") setRain(false);
}

/* ---------- title / inbox ---------- */

function unlocked(mi){
  if(mi===0) return true;
  const all = loadEndings();
  return all[manuscripts[mi-1].key].length > 0;
}

function hintsUnlocked(){
  const a = loadEndings();
  return (a.ms1.length + a.ms2.length + a.ms3.length) >= 1;
}
function loadHintStage(){ try{ return JSON.parse(localStorage.getItem("kousei_hint")||"{}")||{}; }catch(e){ return {}; } }
function saveHintStage(o){ try{ localStorage.setItem("kousei_hint", JSON.stringify(o)); }catch(e){} }

let curHint = {ms:null, end:null, view:1};
function openHint(ms, end){
  const s = loadHintStage();
  if(!s[ms+":"+end]){ s[ms+":"+end]=1; saveHintStage(s); }
  curHint = {ms, end, view: Math.max(1, s[ms+":"+end]||1)};  // 前回まで開いた段階から
  renderHint();
  $("hintbox").classList.add("on");
}
function renderHint(){
  const {ms,end,view} = curHint;
  const arr = HINTS[ms][end];
  const msObj = manuscripts.find(m=>m.key===ms);
  const label = msObj.endDefs.find(d=>d[0]===end)[1];
  $("hb-msname").textContent = msObj.no+"　"+msObj.bookLabel;
  $("hb-end").textContent = "結末　"+label;
  $("hb-body").textContent = arr[view-1];
  $("hb-stage").textContent = "ヒント "+view+" ／ "+arr.length+"（押すほど、はっきりする）";
  $("hb-prev").disabled = view<=1;
  $("hb-more").disabled = view>=arr.length;
  $("hb-more").textContent = view>=arr.length ? "これ以上はない" : "もっと詳しく";
}
$("hb-prev").onclick = ()=>{
  if(curHint.view>1){ curHint.view--; renderHint(); }
};
$("hb-more").onclick = ()=>{
  const arr = HINTS[curHint.ms][curHint.end];
  if(curHint.view < arr.length){
    curHint.view++;
    const k = curHint.ms+":"+curHint.end;
    const s = loadHintStage();
    s[k] = Math.max(s[k]||1, curHint.view);   // 到達した最大段階を保存
    saveHintStage(s);
    renderHint();
  }
};
$("hb-close").onclick = ()=> $("hintbox").classList.remove("on");
$("hintbox").onclick = (e)=>{ if(e.target===$("hintbox")) $("hintbox").classList.remove("on"); };

/* 案B：再校正メモの仄めかし一行（初回は出さない／全取得なら出さない） */
function replayMemoHint(msKey){
  const all = loadEndings();
  const got = all[msKey]||[];
  if(got.length===0 || got.length>=3) return "";
  const ms = manuscripts.find(m=>m.key===msKey);
  const missing = ms.endDefs.map(d=>d[0]).find(k=>!got.includes(k));
  const line = missing && MEMO_HINTS[msKey] ? MEMO_HINTS[msKey][missing] : "";
  return line ? `<p class="whisper">${line}</p>` : "";
}

function renderInbox(){
  const all = loadEndings();
  const uh = hintsUnlocked();
  $("inbox").innerHTML = manuscripts.map((ms,mi)=>{
    const open = unlocked(mi);
    const chips = ms.endDefs.map(([k,l])=>{
      if(all[ms.key].includes(k)) return `<span class="got">${l}</span>`;
      if(uh && open) return `<span class="hintable" data-msk="${ms.key}" data-end="${k}">？</span>`;
      return `<span>？</span>`;
    }).join("");
    if(!open){
      const hint = "（"+manuscripts[mi-1].no+"を校了せよ）";
      return `<div class="card locked"><div class="c-no">${ms.no}</div>
        <div class="c-title">未　着</div><div class="c-auth">${hint}</div>
        <div class="c-ends">${ms.endDefs.map(()=>`<span>？</span>`).join("")}</div></div>`;
    }
    return `<div class="card" data-ms="${mi}"><div class="c-no">${ms.no}</div>
      <div class="c-title">${ms.cardTitle}</div><div class="c-auth">${ms.author}</div>
      <div class="c-ends">${chips}</div></div>`;
  }).join("");
  document.querySelectorAll("#inbox .card[data-ms]").forEach(c=>{
    c.onclick=()=>startManuscript(+c.dataset.ms);
  });
  document.querySelectorAll("#inbox .c-ends span.hintable").forEach(s=>{
    s.onclick=(e)=>{ e.stopPropagation(); openHint(s.dataset.msk, s.dataset.end); };
  });
  const total = all.ms1.length+all.ms2.length+all.ms3.length;
  $("hint-note").textContent = (uh && total<9)
    ? "※ 未取得の「？」を押すと、校閲メモ（ヒント）が確認できる。" : "";
  $("title-sub").textContent = all.ms3.includes("done") ? "――校了。" : "――消セ。";
  $("all-done").textContent = total>=9 ? "全結末、蒐集。おつかれさまでした。" : "";
  const hasSave = total>0 || !!loadName() || Object.keys(loadHintStage()).length>0;
  $("btn-reset").disabled = !hasSave;
}

function startManuscript(mi){
  initAudio();
  setRain(true);
  state.ms=mi;
  state.flowIdx=0;
  state.ci=0; state.page=0;
  state.redacted=new Set();
  state.words=[];
  state.chapterExtra=manuscripts[mi].chapters.map(()=>0);
  state.picked=null;
  state.pending=null;
  if(mi===2){
    const pool=[...loadFed()];
    const fed=[];
    while(fed.length<6 && pool.length) fed.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
    const fallback=["あめ","くらやみ","にわ","かみのけ","こども","ながぐつ"];
    while(fed.length<6) fed.push(fallback[fed.length]);
    state.fed=fed;
  }
  if(mi>0) state.name = loadName() || "校閲担当";
  showMemo(0);
}

/* ---------- 全リセット（結末・ヒント・持ち越しを消して最初から） ---------- */
let resetArmed=false, resetTimer=null;
function disarmReset(){
  resetArmed=false; clearTimeout(resetTimer);
  const b=$("btn-reset"); b.classList.remove("danger"); b.textContent="結末をすべて消して、最初から";
}
$("btn-reset").onclick=()=>{
  if($("btn-reset").disabled) return;
  if(!resetArmed){
    resetArmed=true;
    const b=$("btn-reset");
    b.classList.add("danger");
    b.textContent="本当に消す？（もう一度）";
    resetTimer=setTimeout(disarmReset,3000);
    return;
  }
  clearTimeout(resetTimer); resetArmed=false;
  ["kousei_endings2","kousei_endings","kousei_hint","kousei_words","kousei_name"]
    .forEach(k=>{ try{ localStorage.removeItem(k); }catch(e){} });
  renderInbox();
  const b=$("btn-reset");
  b.classList.remove("danger");
  b.textContent="まっさらに、しました";
  setTimeout(()=>{ b.textContent="結末をすべて消して、最初から"; },1600);
};
</script>
